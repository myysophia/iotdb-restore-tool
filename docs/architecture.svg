  <text x="399.0" y="260" text-anchor="middle" fill="#00b4d8" font-size="10" font-weight="700">6</text>
  <text x="399.0" y="273" text-anchor="middle" fill="#caf0f8" font-size="9">Import</text>
  <text x="399.0" y="285" text-anchor="middle" fill="#caf0f8" font-size="9">TSFiles</text>
  <line x1="428" y1="269.0" x2="431" y2="269.0" stroke="#48cae4" stroke-width="0.8" marker-end="url(#arrow-cyan)"/>
  <!-- Step 7 -->
