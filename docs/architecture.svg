  <rect x="80" y="52" width="180" height="58" rx="2" fill="#0d1f3c" stroke="#00b4d8" stroke-width="1"/>
  <text x="170" y="75" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">CLI Entry</text>
  <text x="170" y="92" text-anchor="middle" fill="#90e0ef" font-size="10">main.go / Cobra</text>

  <!-- Commands -->
  <rect x="310" y="52" width="80" height="26" rx="2" fill="#0d1f3c" stroke="#06d6a0" stroke-width="1"/>
  <text x="350" y="69" text-anchor="middle" fill="#06d6a0" font-size="10">restore</text>

  <rect x="400" y="52" width="60" height="26" rx="2" fill="#0d1f3c" stroke="#48cae4" stroke-width="1"/>
  <text x="430" y="69" text-anchor="middle" fill="#48cae4" font-size="10">check</text>

  <rect x="470" y="52" width="80" height="26" rx="2" fill="#0d1f3c" stroke="#48cae4" stroke-width="1"/>
  <text x="510" y="69" text-anchor="middle" fill="#48cae4" font-size="10">version</text>

