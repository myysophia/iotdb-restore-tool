  <text x="790" y="75" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">Config (Viper)</text>
  <text x="790" y="92" text-anchor="middle" fill="#90e0ef" font-size="10">config.yaml + ENV overrides</text>

