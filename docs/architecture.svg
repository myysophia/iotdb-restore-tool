  <text x="460.0" y="285" text-anchor="middle" fill="#caf0f8" font-size="9">R/W</text>
  <line x1="489" y1="269.0" x2="492" y2="269.0" stroke="#48cae4" stroke-width="0.8" marker-end="url(#arrow-cyan)"/>
