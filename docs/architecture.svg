  <text x="94.0" y="273" text-anchor="middle" fill="#caf0f8" font-size="9">Delete</text>
  <text x="94.0" y="285" text-anchor="middle" fill="#caf0f8" font-size="9">&amp; Cleanup</text>
  <line x1="123" y1="269.0" x2="126" y2="269.0" stroke="#48cae4" stroke-width="0.8" marker-end="url(#arrow-cyan)"/>
  <!-- Step 2 -->
  <rect x="126" y="245" width="58" height="48" rx="2" fill="#0d1f3c" stroke="#48cae4" stroke-width="1"/>
  <text x="155.0" y="260" text-anchor="middle" fill="#00b4d8" font-size="10" font-weight="700">2</text>
  <text x="155.0" y="273" text-anchor="middle" fill="#caf0f8" font-size="9">Restart</text>
  <text x="155.0" y="285" text-anchor="middle" fill="#caf0f8" font-size="9">Pod</text>
  <line x1="184" y1="269.0" x2="187" y2="269.0" stroke="#48cae4" stroke-width="0.8" marker-end="url(#arrow-cyan)"/>
  <!-- Step 3 -->
  <rect x="187" y="245" width="58" height="48" rx="2" fill="#0d1f3c" stroke="#48cae4" stroke-width="1"/>
  <text x="216.0" y="260" text-anchor="middle" fill="#00b4d8" font-size="10" font-weight="700">3</text>
  <text x="216.0" y="273" text-anchor="middle" fill="#caf0f8" font-size="9">Ensure DB</text>
  <text x="216.0" y="285" text-anchor="middle" fill="#caf0f8" font-size="9">&amp; Regions</text>
  <line x1="245" y1="269.0" x2="248" y2="269.0" stroke="#48cae4" stroke-width="0.8" marker-end="url(#arrow-cyan)"/>
  <!-- Step 4 -->
  <rect x="248" y="245" width="58" height="48" rx="2" fill="#0d1f3c" stroke="#48cae4" stroke-width="1"/>
  <text x="277.0" y="260" text-anchor="middle" fill="#00b4d8" font-size="10" font-weight="700">4</text>
  <text x="277.0" y="273" text-anchor="middle" fill="#caf0f8" font-size="9">Prepare</text>
  <text x="277.0" y="285" text-anchor="middle" fill="#caf0f8" font-size="9">Input</text>
  <line x1="306" y1="269.0" x2="309" y2="269.0" stroke="#48cae4" stroke-width="0.8" marker-end="url(#arrow-cyan)"/>
  <!-- Step 5 -->
  <rect x="309" y="245" width="58" height="48" rx="2" fill="#0d1f3c" stroke="#48cae4" stroke-width="1"/>
  <text x="338.0" y="260" text-anchor="middle" fill="#00b4d8" font-size="10" font-weight="700">5</text>
  <text x="338.0" y="273" text-anchor="middle" fill="#caf0f8" font-size="9">Extract</text>
  <text x="338.0" y="285" text-anchor="middle" fill="#caf0f8" font-size="9">Backup</text>
  <line x1="367" y1="269.0" x2="370" y2="269.0" stroke="#48cae4" stroke-width="0.8" marker-end="url(#arrow-cyan)"/>
  <!-- Step 6 -->
